  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<!-- ナビゲーションバー -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-keiba sticky-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-5" href="#races">
      <i class="bi bi-trophy-fill text-warning me-2"></i>競馬メモ
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link rounded px-3" href="#races">
            <i class="bi bi-list-ul me-1"></i>レース一覧
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link rounded px-3" href="#mynotes">
            <i class="bi bi-journal-text me-1"></i>マイメモ
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        <span class="text-white-50 small" id="currentUserDisplay">
          <i class="bi bi-arrow-clockwise spin me-1"></i>確認中...
        </span>
      </div>
    </div>
  </div>
</nav>

<!-- メインコンテンツ -->
<div id="app" class="container-fluid py-3 px-3 px-md-4">
  <div class="d-flex justify-content-center align-items-center" style="height:60vh">
    <div class="text-center">
      <div class="spinner-border text-success mb-3" role="status"></div>
      <p class="text-muted">読み込み中...</p>
    </div>
  </div>
</div>

<!-- ===== メモ編集モーダル ===== -->
<div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header navbar-keiba text-white">
        <h5 class="modal-title" id="noteModalLabel">
          <i class="bi bi-pencil-square me-2"></i>メモを編集
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- 馬名 / レース情報 -->
        <div class="d-flex align-items-center gap-2 mb-3 p-2 bg-light rounded">
          <i class="bi bi-emoji-neutral-fill fs-4 text-success"></i>
          <div>
            <div class="fw-bold fs-6" id="noteHorseName"></div>
            <small class="text-muted" id="noteRaceInfo"></small>
          </div>
        </div>
        <!-- テキストエリア -->
        <div class="mb-3">
          <label class="form-label small fw-bold">メモ内容 <span class="text-muted fw-normal">（Markdown 対応）</span></label>
          <textarea id="noteContent" class="form-control font-monospace" rows="7"
            placeholder="例：&#10;**前走凡走は度外視可**（内枠で砂を被りっぱなし）&#10;今回は外枠でスムーズな競馬ができるはず&#10;上り 33.8 は世代トップクラス → *本命候補*"></textarea>
        </div>
        <!-- タグ -->
        <div class="mb-3">
          <label class="form-label small text-muted">タグ <span class="fw-normal">（カンマ区切り）</span></label>
          <input type="text" id="noteTags" class="form-control form-control-sm"
            placeholder="距離延長, 芝得意, 前走凡走">
        </div>
        <!-- 公開スイッチ -->
        <div class="p-3 rounded border">
          <div class="form-check form-switch mb-1">
            <input class="form-check-input" type="checkbox" id="noteIsPublic" role="switch">
            <label class="form-check-label fw-bold" for="noteIsPublic">
              <i class="bi bi-globe2 me-1 text-success"></i>このメモを公開する
            </label>
          </div>
          <small class="text-muted ms-4">
            公開すると「みんなの共有メモ」に表示されます。編集・削除は自分だけができます。
          </small>
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-outline-danger btn-sm" id="deleteNoteBtn"
          onclick="handleDeleteNote()" style="display:none!important">
          <i class="bi bi-trash me-1"></i>削除
        </button>
        <div class="d-flex gap-2 ms-auto">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-success" onclick="handleSaveNote()">
            <i class="bi bi-save me-1"></i>保存
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 馬の成績モーダル ===== -->
<div class="modal fade" id="horseModal" tabindex="-1" aria-labelledby="horseModalLabel">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content shadow-lg">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title" id="horseModalLabel">
          <i class="bi bi-bar-chart-fill me-2 text-warning"></i>
          <span id="horseModalName"></span> の成績履歴
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="horseModalBody">
        <div class="text-center p-5">
          <div class="spinner-border text-success" role="status"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

</body>
</html>
