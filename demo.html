<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HORSE LOG</title>
  <!-- PWA -->
  <meta name="theme-color" content="#0d1a35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HORSE LOG">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link id="pwaManifestLink" rel="manifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
:root{--green-dark:#1b5e20;--green-main:#2e7d32;--green-light:#66bb6a;--crimson:#c62828;--gold:#f9a825;--silver:#9e9e9e;--bronze:#bf8c5a;--bg:#f4f6f4}
body{background:var(--bg);font-family:'Hiragino Kaku Gothic Pro','メイリオ',sans-serif;font-size:.9rem;color:#212121}
.navbar-keiba{background:linear-gradient(135deg,#060d1f 0%,#0d1a35 100%);border-bottom:1px solid rgba(232,184,75,0.2)}
.navbar-keiba .nav-link:hover,.navbar-keiba .nav-link.active{background:rgba(232,184,75,.12);color:#fff!important}
/* HORSE LOG ロゴ */
.horselog-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.horselog-emblem{width:38px;height:38px;flex-shrink:0}
.horselog-title{font-family:'Bebas Neue','Impact',sans-serif;font-size:22px;letter-spacing:4px;line-height:1}
.horselog-title .hl-horse{color:#fff}
.horselog-title .hl-sep{color:rgba(232,184,75,.4);margin:0 1px}
.horselog-title .hl-log{color:#e8b84b}
.horselog-sub{font-size:7px;letter-spacing:2.5px;color:rgba(232,184,75,.4);font-family:sans-serif;margin-top:1px}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.race-card{border:none;border-left:5px solid var(--green-main);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.09);transition:box-shadow .18s,transform .12s;cursor:pointer;background:#fff}
.race-card:hover{box-shadow:0 5px 16px rgba(0,0,0,.14);transform:translateY(-2px)}
.race-card.grade-G1{border-left-color:var(--crimson)}.race-card.grade-G2{border-left-color:#1565c0}.race-card.grade-G3{border-left-color:#558b2f}.race-card.grade-OP{border-left-color:#6a1b9a}
.badge-grade{font-size:.72rem;padding:3px 7px;border-radius:4px;font-weight:700;color:#fff}
.badge-G1{background:var(--crimson)!important}.badge-G2{background:#1565c0!important}.badge-G3{background:#558b2f!important}.badge-OP{background:#6a1b9a!important}
.entry-table{font-size:.82rem;border-collapse:separate;border-spacing:0}
.entry-table thead th{background:var(--green-dark);color:#fff;font-weight:500;white-space:nowrap;padding:7px 10px;border:none;font-size:.78rem}
.race-list-table{font-size:.88rem;border-collapse:separate;border-spacing:0}
.race-list-table thead th{background:var(--green-dark);color:#fff;font-weight:500;padding:8px 12px;font-size:.8rem;border:none;white-space:nowrap}
.race-list-table tbody tr{cursor:pointer;transition:background .12s}
.race-list-table tbody tr:hover td{background:rgba(27,94,32,.06)}
.race-list-table tbody td{padding:9px 12px;border-bottom:1px solid #e8e8e8;vertical-align:middle}
.race-list-table .grade-cell{width:4px;padding:0!important}
.grade-G1-bar{background:var(--crimson)}
.grade-G2-bar{background:#1565c0}
.grade-G3-bar{background:#558b2f}
.grade-OP-bar{background:#6a1b9a}
.entry-table tbody td{vertical-align:middle;padding:6px 10px;border-bottom:1px solid #e8e8e8}
.entry-table tbody tr:hover td{background:rgba(27,94,32,.04)}
.horse-num{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;color:#fff;flex-shrink:0}
.pos-1{color:var(--gold);font-weight:800}.pos-2{color:var(--silver);font-weight:700}.pos-3{color:var(--bronze);font-weight:700}
.finish-pos{font-size:1rem}
.last3f-best{color:var(--crimson);font-weight:700}.last3f-2nd{color:#1565c0;font-weight:600}
.corner-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:18px;border-radius:3px;font-size:.72rem;font-weight:600;margin-right:2px}
.corner-front{background:#e8f5e9;color:var(--green-dark)}.corner-mid{background:#e3f2fd;color:#1565c0}.corner-back{background:#fff3e0;color:#e65100}.corner-rear{background:#fce4ec;color:var(--crimson)}
.famous-pick{display:inline-block;font-size:.7rem;padding:1px 6px;border-radius:999px;white-space:nowrap;font-weight:600}
.famous-hit{background:#c8e6c9;color:#1b5e20}.famous-miss{background:#ffcdd2;color:var(--crimson)}.famous-tbd{background:#e0e0e0;color:#616161}
.note-preview{font-size:.76rem;color:#1565c0;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;cursor:pointer;text-decoration:underline dotted}
.note-preview.is-public{color:var(--green-main)}
.section-header{border-left:4px solid var(--green-main);padding-left:10px;margin:1.25rem 0 .75rem;font-weight:700;font-size:.95rem;color:var(--green-dark)}
.chart-wrap{position:relative;height:210px}.chart-wrap-sm{position:relative;height:160px}
.public-note-card{background:#f9fbe7;border-left:3px solid var(--green-main);border-radius:5px;padding:10px 14px;margin-bottom:8px}
.public-note-card .note-body{font-size:.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.mynote-card{border:none;border-top:3px solid var(--green-main);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);background:#fff}
.mynote-card.is-public{border-top-color:var(--green-light)}
.filter-bar{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.note-md-content{font-size:.875rem;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.note-md-content code{background:#f1f3f4;padding:1px 4px;border-radius:3px;font-size:.82em}
@media(max-width:768px){
  .entry-table{font-size:.78rem}
  .hide-sp{display:none!important}
  .entry-table tbody td{padding:5px 6px}
  .race-card .card-body{padding:.5rem .75rem}
  .filter-bar{padding:10px 12px}
  .section-header{font-size:.88rem}
  .budget-val{font-size:1.25rem}
  .modal-dialog{margin:.5rem}
  body{font-size:.875rem}
  #app{padding:.5rem .5rem!important}
  .navbar-brand{font-size:1rem!important}
  /* スマホ用ボトムナビ */
  .mobile-bottom-nav{display:flex!important}
  .navbar-keiba .navbar-collapse .navbar-nav{display:none}
}
@media(min-width:769px){
  .mobile-bottom-nav{display:none!important}
}
/* ===== ゲーミフィケーション ===== */
.game-widget{background:linear-gradient(135deg,#1b5e20,#2e7d32);border-radius:12px;color:#fff}
.game-stat-val{font-size:1.5rem;font-weight:800;line-height:1.1}
.game-stat-label{font-size:.65rem;opacity:.8}
.title-badge{display:inline-block;font-size:.8rem;font-weight:700;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.18);color:#fff}
.streak-fire{background:rgba(255,193,7,.25);border-radius:20px;padding:2px 10px;font-size:.75rem}
/* ===== AI分析 ===== */
.ai-score-card{border-radius:6px;padding:8px 10px;margin-bottom:6px}
.ai-score-best{background:#e8f5e9;border:1px solid #a5d6a7}
.ai-score-worst{background:#fce4ec;border:1px solid #f48fb1}
.ai-score-normal{background:#f9f9f9;border:1px solid #e0e0e0}
/* ===== テンプレートボタン ===== */
.template-btn{font-size:.7rem;padding:2px 8px;border-radius:3px;cursor:pointer;white-space:nowrap}
/* ===== PWAインストールバー ===== */
.pwa-install-bar{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;padding:8px 16px;font-size:.82rem;display:none;align-items:center;gap:10px;justify-content:space-between}
.mobile-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;z-index:1000;padding-bottom:env(safe-area-inset-bottom)}
.mobile-bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;font-size:.62rem;color:#888;text-decoration:none;gap:1px}
.mobile-bottom-nav a.active,.mobile-bottom-nav a:hover{color:#e8b84b}
.mobile-bottom-nav i{font-size:1.2rem}
/* 調教評価 */
.training-A{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;font-weight:700;font-size:.7rem;padding:1px 6px;border-radius:3px;display:inline-block}
.training-B{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;font-weight:700;font-size:.7rem;padding:1px 6px;border-radius:3px;display:inline-block}
.training-C{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;font-weight:700;font-size:.7rem;padding:1px 6px;border-radius:3px;display:inline-block}
/* 詳細展開トグル */
.detail-toggle-btn{font-size:.7rem;color:#888;border:1px solid #ddd;background:#fafafa;border-radius:4px;padding:1px 7px;cursor:pointer;white-space:nowrap}
.detail-toggle-btn:hover{background:#f0f0f0}
.entry-detail-row{background:#f9f9f9!important}
.entry-detail-row td{font-size:.75rem;color:#555;padding:4px 10px!important;border-bottom:1px dashed #e0e0e0!important}
.toast-container{z-index:9999}
.demo-banner{background:#fff3cd;border-bottom:1px solid #ffc107;font-size:.82rem;padding:6px 12px;text-align:center}
/* ===== 収支管理 ===== */
.budget-card{border:none;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.10);background:#fff;transition:box-shadow .18s}
.budget-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.14)}
.budget-val{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.budget-label{font-size:.72rem;color:#888;font-weight:500;margin-bottom:2px}
.budget-positive{color:#2e7d32}.budget-negative{color:#c62828}.budget-neutral{color:#1565c0}
.bet-type-badge{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap}
.btype-tan{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.btype-fuku{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.btype-umaren{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.btype-umatan{background:#fce4ec;color:#c62828;border:1px solid #f48fb1}
.btype-wide{background:#f3e5f5;color:#7b1fa2;border:1px solid #ce93d8}
.btype-sanfuku{background:#e8eaf6;color:#283593;border:1px solid #9fa8da}
.btype-santan{background:#fbe9e7;color:#bf360c;border:1px solid #ffab91}
.btype-win5{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.roi-bar-wrap{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-top:4px}
.roi-bar{height:100%;border-radius:3px;transition:width .6s}
.bet-row-hit td{background:rgba(46,125,50,.04)}
.bet-row-miss td{background:rgba(198,40,40,.03)}
/* 成績スタットチップ */
.stat-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.stat-chip{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;padding:1px 5px;border-radius:3px;white-space:nowrap;font-weight:600}
.stat-chip-label{font-weight:400;opacity:.75;font-size:.65rem}
.stat-win   {background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.stat-place {background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.stat-zero  {background:#f5f5f5;color:#757575;border:1px solid #e0e0e0}
.stat-warn  {background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
/* ===== 広告スペース ===== */
.ad-slot{background:#f8f9fa;border:1px dashed #ccc;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bbb;font-size:.72rem;letter-spacing:.05em;text-align:center;overflow:hidden;position:relative}
.ad-slot-label{font-size:.62rem;color:#ccc;position:absolute;top:4px;left:8px;letter-spacing:.08em}
.ad-slot-h{height:70px;width:100%}
.ad-slot-sq{height:250px}
.ad-slot-inner{display:flex;flex-direction:column;align-items:center;gap:4px}
.ad-slot-icon{font-size:1.4rem;opacity:.25}
/* ===== YouTube ===== */
.yt-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#111;border-radius:8px;overflow:hidden;cursor:pointer}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.yt-thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:opacity .2s}
.yt-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.55) 0%,transparent 60%);display:flex;flex-direction:column;align-items:center;justify-content:center}
.yt-play-btn{width:64px;height:44px;background:rgba(255,0,0,.92);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.yt-wrap:hover .yt-play-btn{transform:scale(1.1);background:#ff0000}
.yt-play-btn svg{fill:#fff;width:22px;height:22px}
.yt-caption{position:absolute;bottom:10px;left:12px;right:12px;color:#fff;font-size:.8rem;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.yt-no-video{background:#1a1a1a;border-radius:8px;padding:24px;text-align:center;color:#555;font-size:.83rem}
  </style>
</head>
<body>

<!-- PWAインストールバー -->
<div class="pwa-install-bar" id="pwaInstallBar">
  <div><i class="bi bi-phone-fill me-2"></i><strong>ホーム画面に追加</strong>してアプリとして使えます！</div>
  <div class="d-flex gap-2">
    <button class="btn btn-light btn-sm py-1 px-3 fw-bold" onclick="triggerPWAInstall()">
      <i class="bi bi-download me-1"></i>追加する
    </button>
    <button class="btn btn-outline-light btn-sm py-1 px-2" onclick="document.getElementById('pwaInstallBar').style.display='none'">
      <i class="bi bi-x"></i>
    </button>
  </div>
</div>

<!-- デモバナー -->
<div class="demo-banner">
  <i class="bi bi-info-circle me-1"></i>
  <strong>デモモード</strong> — メモはブラウザのlocalStorageに保存されます。GAS版では Google Sheets に保存されます。
</div>

<!-- ナビゲーション -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-keiba sticky-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand horselog-brand" href="#races">
      <!-- Ver.1 エンブレム（ミニ版） -->

        <line x1="19" y1="1.5" x2="19" y2="36.5" stroke="rgba(232,184,75,0.2)" stroke-width="0.8"/>

      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link rounded px-3" href="#races"><i class="bi bi-list-ul me-1"></i>レース一覧</a></li>

<!-- メインコンテンツ -->
<div id="app" class="container-fluid py-3 px-3 px-md-4" style="padding-bottom:calc(70px + env(safe-area-inset-bottom))"></div>

<!-- スマホ用ボトムナビ -->
<nav class="mobile-bottom-nav" id="mobileBottomNav" style="display:none">
  <a href="#races" class="mobile-nav-link">
    <i class="bi bi-list-ul"></i>
    <span>レース</span>
  </a>
  <a href="#mynotes" class="mobile-nav-link">
    <i class="bi bi-journal-text"></i>
    <span>マイメモ</span>
  </a>

    <i class="bi bi-bar-chart-line"></i>
    <span>収支</span>
  </a>
  <a href="#analysis" class="mobile-nav-link">
    <i class="bi bi-robot"></i>
    <span>AI分析</span>
  </a>
</nav>

<!-- メモ編集モーダル -->
<div class="modal fade" id="noteModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header navbar-keiba text-white">
        <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>メモを編集</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex align-items-center gap-2 mb-3 p-2 bg-light rounded">
          <i class="bi bi-emoji-neutral-fill fs-4 text-success"></i>
          <div>
            <div class="fw-bold fs-6" id="noteHorseName"></div>
            <small class="text-muted" id="noteRaceInfo"></small>
          </div>
        </div>
        <div class="mb-3">
          <div class="d-flex align-items-center flex-wrap gap-1 mb-2">
            <span class="text-muted" style="font-size:.72rem;white-space:nowrap">📋 テンプレ:</span>
            <button class="btn btn-outline-success template-btn" onclick="applyNoteTemplate('predict')">🎯 予想</button>
            <button class="btn btn-outline-primary template-btn" onclick="applyNoteTemplate('quick')">⚡ 速攻</button>
            <button class="btn btn-outline-warning template-btn" onclick="applyNoteTemplate('review')">📊 回顧</button>
            <button class="btn btn-outline-danger template-btn" onclick="applyNoteTemplate('watch')">👀 注目馬</button>
          </div>
          <label class="form-label small fw-bold">メモ内容 <span class="text-muted fw-normal">（Markdown 対応）</span></label>
          <textarea id="noteContent" class="form-control font-monospace" rows="7"
            placeholder="例：&#10;**前走凡走は度外視可**（内枠で砂を被りっぱなし）&#10;今回は外枠でスムーズな競馬ができるはず&#10;上り 33.8 は世代トップクラス → *本命候補*"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label small text-muted">タグ（カンマ区切り）</label>
          <input type="text" id="noteTags" class="form-control form-control-sm" placeholder="距離延長, 芝得意, 前走凡走">
        </div>
        <div class="p-3 rounded border">
          <div class="form-check form-switch mb-1">
            <input class="form-check-input" type="checkbox" id="noteIsPublic" role="switch">
            <label class="form-check-label fw-bold" for="noteIsPublic">
              <i class="bi bi-globe2 me-1 text-success"></i>このメモを公開する
            </label>
          </div>
          <small class="text-muted ms-4">公開すると「みんなの共有メモ」に表示されます。</small>
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-outline-danger btn-sm" id="deleteNoteBtn" onclick="handleDeleteNote()">
          <i class="bi bi-trash me-1"></i>削除
        </button>
        <div class="d-flex gap-2 ms-auto">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-success" onclick="handleSaveNote()">
            <i class="bi bi-save me-1"></i>保存
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 馬の成績モーダル -->
<div class="modal fade" id="horseModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content shadow-lg">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          <i class="bi bi-bar-chart-fill me-2 text-warning"></i>

<!-- ===== 馬券記録モーダル ===== -->
<div class="modal fade" id="betModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:400px">
    <div class="modal-content shadow-lg">
      <div class="modal-header py-2" style="background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff">
        <div>
          <div class="fw-bold small"><i class="bi bi-ticket-detailed me-1"></i><span id="betRaceName">馬券記録</span></div>
          <div class="text-white-50" style="font-size:.72rem" id="betRaceInfo"></div>
        </div>
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-3 px-3">
        <!-- レース選択（収支ページから開く時のみ表示） -->
        <div id="betRaceSelector" class="mb-3" style="display:none">
          <select id="betRaceSelect" class="form-select form-select-sm"></select>
        </div>
        <!-- 式別 -->
        <div class="mb-3">
          <div class="d-flex flex-wrap gap-1">
            <input type="radio" class="btn-check" name="betType" id="bt_単勝" value="単勝" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_単勝">単勝</label>
            <input type="radio" class="btn-check" name="betType" id="bt_複勝" value="複勝" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_複勝">複勝</label>
            <input type="radio" class="btn-check" name="betType" id="bt_馬連" value="馬連" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_馬連">馬連</label>
            <input type="radio" class="btn-check" name="betType" id="bt_馬単" value="馬単" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_馬単">馬単</label>
            <input type="radio" class="btn-check" name="betType" id="bt_ワイド" value="ワイド" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_ワイド">ワイド</label>
            <input type="radio" class="btn-check" name="betType" id="bt_三連複" value="三連複" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_三連複">三連複</label>
            <input type="radio" class="btn-check" name="betType" id="bt_三連単" value="三連単" autocomplete="off">
            <label class="btn btn-sm btn-outline-secondary py-1 px-2" for="bt_三連単">三連単</label>
          </div>
        </div>
        <!-- 購入額・払戻額 -->
        <div class="d-flex gap-2 align-items-end">
          <div class="flex-grow-1">
            <label class="form-label small fw-bold mb-1">購入額</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">¥</span>
              <input type="number" id="betStake" class="form-control" placeholder="1000" min="100" step="100">
            </div>
          </div>
          <div class="flex-grow-1">
            <label class="form-label small fw-bold mb-1">払戻額</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">¥</span>
              <input type="number" id="betReturn" class="form-control" placeholder="0=外れ" min="0">
            </div>
          </div>
          <button type="button" class="btn btn-primary btn-sm px-3" onclick="handleSaveBet()" title="保存">
            <i class="bi bi-check-lg"></i>
          </button>
        </div>
      </div>
      <div class="modal-footer py-2 d-flex justify-content-between">
        <button type="button" class="btn btn-link text-danger btn-sm p-0" id="deleteBetBtn" onclick="handleDeleteBet()">

      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="raceNoteModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">

      <div class="modal-header" style="background:linear-gradient(135deg,#37474f,#546e7a);color:#fff">

        </div>
      </div>
    </div>
  </div>
</div>

const NOTES_KEY = 'keiba_demo_notes';
const DEMO_USER = 'demo@keibamemo.jp';

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); } catch { return []; }
}
function saveNotes(notes) {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

function mockGetRaces(fj) {
  const f = fj ? JSON.parse(fj) : {};
  let races = [...MOCK.races];
  if (f.date)   races = races.filter(r => r.date === f.date);
  if (f.venue)  races = races.filter(r => r.venue === f.venue);
  if (f.search) { const q = f.search.toLowerCase(); races = races.filter(r => r.race_name.toLowerCase().includes(q) || r.venue.toLowerCase().includes(q)); }
  races.sort((a, b) => b.date.localeCompare(a.date));
  return JSON.stringify(races);
}

function mockGetRaceDetail(raceId) {
  const race    = MOCK.races.find(r => r.race_id === raceId) || {};
  const entries = (MOCK.entries[raceId] || []).sort((a, b) => a.horse_num - b.horse_num);
  const results = (MOCK.results[raceId] || []).sort((a, b) => a.finish_pos - b.finish_pos);
  const famous  = MOCK.famous[raceId] || [];
  const all     = loadNotes().filter(n => n.race_id === raceId);
  const notes   = all
    .filter(n => n.user_email === DEMO_USER || n.is_public)
    .map(n => ({ ...n, is_own: n.user_email === DEMO_USER }));
  return JSON.stringify({ race, entries, results, notes, famous, userEmail: DEMO_USER });
}

function mockSaveNote(nj) {
  const nd    = JSON.parse(nj);
  const notes = loadNotes();
  const idx   = notes.findIndex(n => n.race_id === nd.race_id && n.horse_name === nd.horse_name && n.user_email === DEMO_USER);
  const now   = new Date().toLocaleString('ja-JP');
  if (idx >= 0) {
    notes[idx] = { ...notes[idx], content: nd.content, is_public: nd.is_public, tags: nd.tags, updated_at: now };
  } else {
    notes.push({ note_id:'N'+Date.now(), race_id:nd.race_id, horse_name:nd.horse_name, user_email:DEMO_USER,
      content:nd.content, is_public:nd.is_public, tags:nd.tags,
      created_at:now, updated_at:now });
  }
  saveNotes(notes);
  return JSON.stringify({ success:true });
}

function mockDeleteNote(raceId, horseName) {
  const notes = loadNotes().filter(n => !(n.race_id === raceId && n.horse_name === horseName && n.user_email === DEMO_USER));
  saveNotes(notes);
  return JSON.stringify({ success:true });
}

function mockGetMyNotes() {
  return JSON.stringify(
    loadNotes()
      .filter(n => n.user_email === DEMO_USER)
      .sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)))
  );
}

// google.script.run ファクトリー
function createChain() {
  let _s = null, _f = null;
  const delay = (fn) => setTimeout(() => { try { const r = fn(); if (r !== undefined) _s?.(r); } catch(e) { _f?.(e); } }, 80 + Math.random()*120);
  const c = {
    withSuccessHandler(fn) { _s = fn; return c; },
    withFailureHandler(fn) { _f = fn; return c; },
    getCurrentUser()       { delay(() => DEMO_USER); },
    getRaces(fj)           { delay(() => mockGetRaces(fj)); },
    getRaceDetail(id)      { delay(() => mockGetRaceDetail(id)); },
    saveNote(nj)           { delay(() => mockSaveNote(nj)); },
    deleteNote(rid, hn)    { delay(() => mockDeleteNote(rid, hn)); },
    getMyNotes()           { delay(() => mockGetMyNotes()); },
    getHorseHistory(hn)    { delay(() => mockGetHorseHistory(hn)); },
    getBets()              { delay(() => mockGetBets()); },
    saveBet(bj)            { delay(() => mockSaveBet(bj)); },
    deleteBet(id)          { delay(() => mockDeleteBet(id)); },
    getRaceNote(rid)       { delay(() => mockGetRaceNote(rid)); },
    saveRaceNote(nj)       { delay(() => mockSaveRaceNote(nj)); },
    deleteRaceNote(rid)    { delay(() => mockDeleteRaceNote(rid)); },
    getAllRaceNotes()       { delay(() => mockGetAllRaceNotes()); },
  };
  return c;
}
const google = { script: { run: new Proxy({}, { get(_, p) { return (...a) => { const c = createChain(); c[p]?.(...a); return c; }; } }) } };

  window.addEventListener('hashchange', router);
});

function router() {
  const hash = location.hash || '#races';
  const parts = hash.replace('#','').split('/');
  const page = parts[0];
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-link[href="#${page}"]`)?.classList.add('active');
  switch(page) {
    case 'race':     renderRaceDetail(parts[1]);  break;
    case 'mynotes':  renderMyNotes();             break;
    case 'budget':   renderBudget();              break;
    case 'analysis': renderAnalysis();            break;
    default:         renderRaceList();
  }
  // スマホボトムナビのアクティブ更新
  document.querySelectorAll('.mobile-nav-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('href') === `#${page}`);
  });
}

  document.getElementById('app').innerHTML = `
    <div class="d-flex justify-content-center align-items-center flex-column" style="height:55vh">
      <div class="spinner-border text-success mb-3" style="width:2.5rem;height:2.5rem" role="status"></div>
      <p class="text-muted small">${escHtml(msg)}</p>
    </div>`;
}
function showError(msg) {
  document.getElementById('app').innerHTML = `<div class="alert alert-danger m-3"><i class="bi bi-exclamation-circle me-2"></i>${escHtml(msg)}</div>`;
}
function showToast(msg, type='success') {
  const colors={success:'bg-success',warning:'bg-warning text-dark',danger:'bg-danger'};
  const icons={success:'check-circle-fill',warning:'exclamation-triangle-fill',danger:'x-circle-fill'};
  const id='toast-'+Date.now();
  let cont=document.querySelector('.toast-container');
  if(!cont){cont=document.createElement('div');cont.className='toast-container position-fixed bottom-0 end-0 p-3';document.body.appendChild(cont);}
  cont.insertAdjacentHTML('beforeend',`<div id="${id}" class="toast align-items-center text-white ${colors[type]||'bg-secondary'} border-0" role="alert"><div class="d-flex"><div class="toast-body"><i class="bi bi-${icons[type]||'info-circle-fill'} me-2"></i>${escHtml(msg)}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
  const el=document.getElementById(id);
  new bootstrap.Toast(el,{delay:3000}).show();
  el.addEventListener('hidden.bs.toast',()=>el.remove());
}

      <p style="font-size:.7rem;color:#999;margin-top:4px">※過去3年の同条件複勝率（モックデータ）</p>
    </div>`;

  if(hasResults) requestAnimationFrame(()=>{ renderLastFChart(results); renderCornerChart(results); });

// ── 枠順傾向チャート ──
function renderGateChart(race) {
  destroyChart('gateChart');
  const cv = document.getElementById('gateChart'); if(!cv) return;
  const dist = Number(race.distance||0);
  const surface = race.surface||'芝';
  let gateRates;
  if(surface === 'ダ') {
    gateRates = [38, 40, 42, 48, 52, 55, 53, 50];
  } else if(dist <= 1400) {
    gateRates = [58, 55, 52, 48, 45, 43, 40, 38];
  } else {
    gateRates = [48, 50, 52, 54, 52, 55, 53, 50];
  }
  const gateColors = ['#c62828','#c62828','#ff8f00','#ff8f00','#2e7d32','#2e7d32','#1565c0','#1565c0'];
  const maxRate = Math.max(...gateRates);
  chartStore['gateChart'] = new Chart(cv, {
    type: 'bar',
    data: {
      labels: ['1枠','2枠','3枠','4枠','5枠','6枠','7枠','8枠'],
      datasets: [{
        label: '複勝率%',
        data: gateRates,
        backgroundColor: gateColors.map((c,i) => c + (gateRates[i] >= maxRate - 5 ? 'dd' : '77')),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw+'%' } } },
      scales: {
        y: { beginAtZero: true, max: 70, ticks: { callback: v => v+'%', font: { size: 10 } }, grid: { color: '#f0f0f0' } },
        x: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function handleSaveNote() {
  const {raceId,horseName}=state.currentNote;
  const content=document.getElementById('noteContent').value.trim();
  if(!content){showToast('メモを入力してください','warning');return;}
  google.script.run

      else showToast(res.message||'保存に失敗しました','danger');

    .saveNote(JSON.stringify({race_id:raceId,horse_name:horseName,content,is_public:document.getElementById('noteIsPublic').checked,tags:document.getElementById('noteTags').value.trim()}));
}
function handleDeleteNote() {
  const {raceId,horseName}=state.currentNote;
  if(!confirm(`「${horseName}」のメモを削除しますか？`))return;
  google.script.run
    .withSuccessHandler(json=>{const res=JSON.parse(json);if(res.success){noteModal.hide();showToast('メモを削除しました','warning');renderRaceDetail(raceId);}else showToast(res.message,'danger');})

}

function renderTagAnalysisHTML(notes) {
  if(!notes.length) return `<div class="text-center py-5 text-muted"><i class="bi bi-tags fs-1 d-block mb-3"></i><p>タグ付きのメモを追加するとここで集計されます。</p></div>`;

  // タグ → 各メモの着順を収集
  const tagMap = {};
  notes.forEach(n => {
    const tags = parseTags(n.tags||'');
    // 着順を MOCK から取得
    const raceResults = MOCK.results[n.race_id] || [];
    const result = raceResults.find(r=>r.horse_name===n.horse_name);
    const pos = result ? Number(result.finish_pos) : null;
    tags.forEach(tag => {
      if(!tagMap[tag]) tagMap[tag] = { total:0, win:0, place:0, items:[] };
      tagMap[tag].total++;
      if(pos===1) tagMap[tag].win++;
      if(pos && pos<=3) tagMap[tag].place++;
      tagMap[tag].items.push({ horse:n.horse_name, race_id:n.race_id, pos });
    });
  });

  const sorted = Object.entries(tagMap).sort((a,b)=>b[1].total-a[1].total);
  if(!sorted.length) return `<div class="text-center py-4 text-muted">タグがありません。メモにタグを追加してください。</div>`;

  return `
    <div class="card border-0 shadow-sm mb-3">
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0" style="font-size:.85rem">
          <thead style="background:#455a64;color:#fff">
            <tr>
              <th class="px-3 py-2">タグ</th>
              <th class="text-center">件数</th>
              <th class="text-center">単勝的中</th>
              <th class="text-center">3着内</th>
              <th class="text-center">複勝率</th>
              <th>評価</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(([tag,v])=>{
              const placePct = Math.round(v.place/v.total*100);
              const winPct   = Math.round(v.win/v.total*100);
              const stars    = placePct>=60?'★★★':placePct>=35?'★★☆':'★☆☆';
              const starCls  = placePct>=60?'text-warning':placePct>=35?'text-secondary':'text-muted';
              const hasResult = v.items.some(i=>i.pos!=null);
              return `<tr>
                <td class="px-3 fw-bold">
                  <span class="badge" style="background:#e8eaf6;color:#283593;border:1px solid #9fa8da;font-size:.78rem">${escHtml(tag)}</span>
                </td>
                <td class="text-center">${v.total}</td>
                <td class="text-center ${winPct>0?'text-warning fw-bold':''}">${v.win}件</td>
                <td class="text-center ${v.place>0?'fw-bold':''}">${v.place}件</td>
                <td class="text-center">
                  ${hasResult
                    ? `<span class="${placePct>=60?'text-success fw-bold':placePct>=35?'text-primary':''}">${placePct}%</span>`
                    : '<span class="text-muted small">結果待ち</span>'}
                </td>
                <td class="${starCls}">${hasResult ? stars : '<span class="text-muted">—</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="text-muted small p-2">
      <i class="bi bi-info-circle me-1"></i>
      着順が確定したレースのみ集計。タグは馬メモの「タグ」欄から入力してください。
    </div>`;
}

// タグ文字列を配列に変換（# 区切りまたはカンマ区切り）
function parseTags(tagStr) {
  if(!tagStr) return [];
  return tagStr.split(/[,，\s]+/)
    .map(t => t.replace(/^#/, '').trim())
    .filter(t => t.length > 0);
}

// ── ヘルパー ──
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escHtmlAttr(s){return escHtml(s).replace(/'/g,'&#39;');}
function mdToHtml(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');}
function formatDateJP(dateStr) {
  if(!dateStr)return'';
  try{const[y,m,d]=String(dateStr).split('-').map(Number);if(!y||!m||!d)return String(dateStr);const dt=new Date(y,m-1,d);const days=['日','月','火','水','木','金','土'];return`${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}(${days[dt.getDay()]})`;}catch{return String(dateStr);}
}
function weatherEmoji(w){return{'晴':'☀️','曇':'☁️','雨':'🌧️','小雨':'🌦️','雪':'❄️','雷':'⛈️'}[w]||'🌡️';}
function horseNumStyle(num) {
  const s=['','background:#fff;color:#333;border:1px solid #ccc','background:#000;color:#fff','background:#c00;color:#fff','background:#039;color:#fff','background:#fc0;color:#333','background:#060;color:#fff','background:#f60;color:#fff','background:#f69;color:#fff','background:#80c;color:#fff','background:#3cc;color:#333','background:#fcc;color:#333','background:#9c3;color:#333','background:#c96;color:#fff','background:#69c;color:#fff','background:#c36;color:#fff'];
  return s[num]||'background:#607d8b;color:#fff';
}
function renderCornerBadges(r) {
  const corners=[r.corner_1,r.corner_2,r.corner_3,r.corner_4];
  if(!corners.some(c=>c!==''&&c!=null))return'-';
  return corners.map((c,i)=>{if(c===''||c==null)return'';const n=Number(c);const cls=n<=3?'corner-front':n<=6?'corner-mid':n<=10?'corner-back':'corner-rear';return`<span class="corner-badge ${cls}">${n}</span>`;}).join('');
}

// ===== 馬の成績統計 =====

// 対象馬の全過去成績を収集（MOCK data から）
function collectHorseHistory(horseName, excludeRaceId) {
  const raceMap = {};
  MOCK.races.forEach(r => { raceMap[r.race_id] = r; });
  const history = [];
  Object.entries(MOCK.results).forEach(([rid, arr]) => {
    if (rid === excludeRaceId) return;
    arr.forEach(r => {
      if (r.horse_name === horseName) {
        history.push({ ...r, race: raceMap[rid] || {} });
      }
    });
  });
  // 新しい順
  history.sort((a, b) => String(b.race.date||'').localeCompare(String(a.race.date||'')));
  return history;
}

function computeHorseStats(horseName, currentRaceId, venue, distance) {
  const history = collectHorseHistory(horseName, currentRaceId);
  if (!history.length) return null;

  const wins   = h => Number(h.finish_pos) === 1;
  const placed = h => Number(h.finish_pos) <= 3;

  // 直近5走
  const recent = history.slice(0, 5);

  // 同競馬場
  const sameVenue = history.filter(h => h.race.venue === venue);

  // 同距離帯 ±200m
  const dist = Number(distance);
  const sameDist = history.filter(h => Math.abs(Number(h.race.distance) - dist) <= 200);

  // 芝・ダート
  const sameSurface = history.filter(h => h.race.surface === (MOCK.races.find(r=>r.race_id===currentRaceId)||{}).surface);

  return { history, recent, sameVenue, sameDist, sameSurface, wins, placed };
}

function renderStatChip(label, races, wins, placed) {
  if (!races.length) return '';
  const w = races.filter(wins).length;
  const p = races.filter(placed).length;
  const pct = Math.round(w / races.length * 100);
  let cls = 'stat-zero';
  if (w > 0) cls = pct >= 40 ? 'stat-win' : 'stat-place';
  else if (p > 0) cls = 'stat-warn';
  return `<span class="stat-chip ${cls}">
    <span class="stat-chip-label">${label}</span>
    ${races.length}戦${w}勝${p}連対
  </span>`;
}

function renderBudgetChart(bets) {
  destroyChart('budgetChart');
  const cv = document.getElementById('budgetChart'); if(!cv) return;
  // 日付昇順でソート → 累計収支を計算
  const sorted = [...bets].sort((a,b)=>a.date.localeCompare(b.date)||(a.race_num-b.race_num));
  let cum = 0;
  const labels = [], cumData = [], colors = [];
  sorted.forEach(b => {
    cum += Number(b.return_amount||0) - Number(b.stake||0);
    labels.push(b.date.slice(5)+' '+b.race_num+'R');
    cumData.push(cum);
    colors.push(cum >= 0 ? 'rgba(46,125,50,.8)' : 'rgba(198,40,40,.8)');
  });
  chartStore['budgetChart'] = new Chart(cv, {
    type: 'bar',
    data: { labels, datasets: [
      { label:'累計収支', data: cumData, backgroundColor: colors, borderColor: colors, borderWidth: 0, borderRadius: 3 },
      { label:'累計収支(線)', data: cumData, type:'line', borderColor:'#1565c0', backgroundColor:'transparent', borderWidth:2, pointRadius:3, tension:.3 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label: ctx => `収支: ${ctx.parsed.y>=0?'+':''}¥${ctx.parsed.y.toLocaleString()}`
      }}},
      scales:{
        x:{ ticks:{ font:{size:9}, maxRotation:40 } },
        y:{ title:{display:true,text:'累計収支(円)',font:{size:10}}, ticks:{font:{size:10},callback:v=>`¥${v.toLocaleString()}`} }
      }
    }
  });
}

function openBetModal(raceId) {

    bet_id: null, race_id: raceId||'',
    race_name: race?.race_name||'', date: race?.date||'',

function openBetModalEditById(betId) {
  const bet = loadBets().find(b=>b.bet_id===betId);
  if(bet) openBetModalEdit(bet);
}
function openBetModalEdit(bet) {
  state.currentBet = { ...bet };
  const race = MOCK.races.find(r=>r.race_id===bet.race_id);
  _fillBetModal(bet, race, false);
  betModal.show();
}
function _fillBetModal(bet, race, showSelector) {
  document.getElementById('betRaceName').textContent = bet.race_name || 'レースを選択';
  document.getElementById('betRaceInfo').textContent = race
    ? `${formatDateJP(race.date)} ${race.venue} ${race.race_num}R ${race.distance}m${race.surface}`
    : (bet.date ? `${formatDateJP(bet.date)} ${bet.venue} ${bet.race_num}R` : '');
  document.querySelectorAll('input[name="betType"]').forEach(r => { r.checked = r.value === bet.bet_type; });
  document.getElementById('betStake').value  = bet.stake || '';
  document.getElementById('betReturn').value = bet.return_amount != null ? bet.return_amount : '';
  document.getElementById('deleteBetBtn').style.display = bet.bet_id ? '' : 'none';
  // レース選択ドロップダウン（収支ページ→新規の場合のみ）
  const sel = document.getElementById('betRaceSelector');
  sel.style.display = showSelector ? '' : 'none';
  if (showSelector) {
    const allRaces = [...MOCK.races].sort((a,b)=>b.date.localeCompare(a.date)||(a.race_num-b.race_num));
    document.getElementById('betRaceSelect').innerHTML =
      '<option value="">レースを選択...</option>' +
      allRaces.map(r=>`<option value="${r.race_id}">${formatDateJP(r.date)} ${r.venue} ${r.race_num}R ${r.race_name}</option>`).join('');
    document.getElementById('betRaceSelect').onchange = e => {
      const r = MOCK.races.find(x=>x.race_id===e.target.value);
      if(r){ Object.assign(state.currentBet,{race_id:r.race_id,race_name:r.race_name,date:r.date,venue:r.venue,race_num:r.race_num});
        document.getElementById('betRaceName').textContent=r.race_name;
        document.getElementById('betRaceInfo').textContent=`${formatDateJP(r.date)} ${r.venue} ${r.race_num}R ${r.distance}m${r.surface}`; }
    };
  }
}
function handleSaveBet() {
  const bt    = document.querySelector('input[name="betType"]:checked')?.value;
  const stake = Number(document.getElementById('betStake').value);
  const ret   = Number(document.getElementById('betReturn').value || 0);
  if(!state.currentBet?.race_id){ showToast('レースを選択してください','warning'); return; }
  if(!bt)   { showToast('式別を選択してください','warning'); return; }
  if(!stake){ showToast('購入額を入力してください','warning'); return; }
  const bet = { ...state.currentBet, bet_type:bt, stake, return_amount:ret };
  google.script.run
    .withSuccessHandler(json=>{ const r=JSON.parse(json); if(r.success){ betModal.hide(); showToast('保存しました ✓'); if(location.hash==='#budget') renderBudget(); } else showToast(r.message||'エラー','danger'); })
    .withFailureHandler(err=>showToast(err.message,'danger'))
    .saveBet(JSON.stringify(bet));

    quick:   `✅ 注目ポイント:\n\n⚠️ 不安材料:\n\n💡 評価:`,

  const empty = { streak:0, maxStreak:0, winRate:0, roi:0, totalBets:0, hits:0,
    title:'データなし', titleColor:'#9e9e9e', badge:'🐴', totalStake:0, totalReturn:0 };
  if (!bets.length) return empty;

  const totalStake  = bets.reduce((s, b) => s + Number(b.stake||0), 0);
  const totalReturn = bets.reduce((s, b) => s + Number(b.return_amount||0), 0);
  const hits        = bets.filter(b => Number(b.return_amount||0) > 0);
  const winRate     = Math.round(hits.length / bets.length * 100);
  const roi         = totalStake > 0 ? Math.round(totalReturn / totalStake * 100) : 0;

  // 連続的中（日付・R番号昇順）
  const sorted = [...bets].sort((a, b) => a.date.localeCompare(b.date) || (a.race_num - b.race_num));
  let maxStreak = 0, cur = 0;
  sorted.forEach(b => {
    if (Number(b.return_amount||0) > 0) { cur++; if (cur > maxStreak) maxStreak = cur; }
    else cur = 0;
  });
  // 現在の連続的中（末尾から）
  let streak = 0;
  for (const b of [...sorted].reverse()) {
    if (Number(b.return_amount||0) > 0) streak++;
    else break;
  }

  // 称号判定
  let title, titleColor, badge, nextGoal;
  if      (bets.length < 3)                  { title='見習い予想師'; titleColor='#9e9e9e'; badge='🐴'; nextGoal=`あと${3-bets.length}レースで新米昇格！`; }
  else if (roi >= 150 && winRate >= 40)      { title='伝説の予想師'; titleColor='#f9a825'; badge='👑'; nextGoal='頂点に立った！'; }
  else if (roi >= 130 || (winRate >= 50 && roi >= 100)) { title='天才予想師'; titleColor='#e53935'; badge='🏆'; nextGoal='伝説まであと一歩！'; }
  else if (roi >= 110 || winRate >= 45)      { title='凄腕予想師'; titleColor='#1565c0'; badge='⭐'; nextGoal='天才まであと少し！'; }
  else if (roi >= 100 || winRate >= 35)      { title='一流予想師'; titleColor='#2e7d32'; badge='🎯'; nextGoal='凄腕を目指せ！'; }
  else if (roi >= 80  || winRate >= 25)      { title='ベテラン予想師'; titleColor='#6d4c41'; badge='📚'; nextGoal='回収率100%を目指そう！'; }
  else if (bets.length >= 5)                 { title='修行中の予想師'; titleColor='#607d8b'; badge='📝'; nextGoal='継続は力なり！'; }
  else                                        { title='新米予想師'; titleColor='#607d8b'; badge='🔰'; nextGoal='まず5レース記録しよう！'; }

  return { streak, maxStreak, winRate, roi, totalBets: bets.length, hits: hits.length,
    title, titleColor, badge, nextGoal, totalStake, totalReturn };
}

function calcAIAnalysis() {
  const bets = loadBets();
  if (bets.length < 3) return null;

  const raceMap = {};
  MOCK.races.forEach(r => { raceMap[r.race_id] = r; });

  const bySurface = {}, byDist = { '〜1400m':[], '1600m':[], '1800m':[], '2000m〜':[] };
  const byBetType = {}, byVenue = {};

  bets.forEach(b => {
    const race = raceMap[b.race_id] || {};
    const hit  = Number(b.return_amount||0) > 0;
    const entry = { hit, stake: Number(b.stake||0), ret: Number(b.return_amount||0) };

    // 馬場別
    const surf = race.surface || b.venue ? (race.surface||'不明') : '不明';
    if (!bySurface[surf]) bySurface[surf] = [];
    bySurface[surf].push(entry);

    // 距離帯別
    const dist = Number(race.distance||0);
    const dKey = dist <= 1400 ? '〜1400m' : dist === 1600 ? '1600m' : dist <= 1900 ? '1800m' : dist > 0 ? '2000m〜' : null;
    if (dKey) byDist[dKey].push(entry);

    // 式別
    const bt = b.bet_type || '不明';
    if (!byBetType[bt]) byBetType[bt] = [];
    byBetType[bt].push(entry);

    // 競馬場別
    const venue = b.venue || race.venue || '不明';
    if (!byVenue[venue]) byVenue[venue] = [];
    byVenue[venue].push(entry);
  });

  const summarize = arr => {
    if (!arr.length) return null;
    const hits = arr.filter(e => e.hit).length;
    const stake = arr.reduce((s, e) => s + e.stake, 0);
    const ret   = arr.reduce((s, e) => s + e.ret, 0);
    return { count: arr.length, winRate: Math.round(hits/arr.length*100),
      roi: stake > 0 ? Math.round(ret/stake*100) : 0, profit: ret - stake };
  };

  const toArr = obj => Object.entries(obj).map(([k,v]) => ({ label:k, ...summarize(v) })).filter(x=>x.count>0);

  return {
    surface:  toArr(bySurface).sort((a,b)=>b.roi-a.roi),
    distance: Object.entries(byDist).filter(([,v])=>v.length>0).map(([k,v])=>({label:k,...summarize(v)})),
    betType:  toArr(byBetType).sort((a,b)=>b.count-a.count),
    venue:    toArr(byVenue).sort((a,b)=>b.count-a.count),
    totalBets: bets.length,
  };
}

function renderAnalysis() {
  const ai = calcAIAnalysis();
  const gs = calcGameStats();

  const scoreCard = (label, icon, stats, cls) => {
    if (!stats) return '';
    const roi = stats.roi, wr = stats.winRate;
    const bg = cls==='best'?'ai-score-best':cls==='worst'?'ai-score-worst':'ai-score-normal';
    return `
      <div class="ai-score-card ${bg}">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span style="font-size:.82rem;font-weight:700">${icon} ${escHtml(label)}</span>
            <small class="text-muted ms-1">${stats.count}戦</small>
            ${cls==='best'?'<span class="ms-1 badge bg-success" style="font-size:.6rem">◎得意</span>':''}
            ${cls==='worst'?'<span class="ms-1 badge bg-danger" style="font-size:.6rem">△苦手</span>':''}
          </div>
          <div class="text-end">
            <span class="${wr>=40?'text-success':wr<20?'text-danger':'text-secondary'} fw-bold" style="font-size:.85rem">${wr}%的中</span>
            <span class="${roi>=100?'text-success':'text-danger'} fw-bold ms-2" style="font-size:.85rem">${roi}%回収</span>
          </div>
        </div>
      </div>`;
  };

  const bw = arr => {
    const f = arr.filter(a=>a.count>=2);
    if (f.length < 2) return { best:null, worst:null };
    const s = [...f].sort((a,b)=>b.roi-a.roi);
    return { best:s[0].label, worst:s[s.length-1].label };
  };

  // AIコメント生成
  const tips = [];
  if (ai) {
    const bestSurf = ai.surface.find(s=>s.count>=2&&s.roi>=100);
    if (bestSurf) tips.push(`✅ <strong>${bestSurf.label}</strong>は回収率${bestSurf.roi}%と好成績！得意な条件です。`);
    const worstSurf = [...(ai.surface)].sort((a,b)=>a.roi-b.roi).find(s=>s.count>=2&&s.roi<70);
    if (worstSurf) tips.push(`⚠️ <strong>${worstSurf.label}</strong>は回収率${worstSurf.roi}%。買い控えも検討を。`);
    const bestBt = ai.betType.find(b=>b.count>=2&&b.roi>=110);
    if (bestBt) tips.push(`💡 <strong>${bestBt.label}</strong>は相性◎（回収率${bestBt.roi}%）。積極的に狙おう！`);
    const bestV = [...(ai.venue)].sort((a,b)=>b.roi-a.roi).find(v=>v.count>=2&&v.roi>=110);
    if (bestV) tips.push(`🏇 <strong>${bestV.label}</strong>は得意競馬場（回収率${bestV.roi}%）！`);
    if (gs.streak >= 3) tips.push(`🔥 現在${gs.streak}連続的中中！この調子を維持しよう！`);
    if (!tips.length) tips.push('📊 データが蓄積されるとより詳細なアドバイスが出ます。馬券を記録し続けましょう！');
  }

  document.getElementById('app').innerHTML = `
    <div class="d-flex align-items-center mb-3 gap-2">
      <h5 class="mb-0 fw-bold"><i class="bi bi-robot me-2 text-success"></i>AI予想分析</h5>
      <small class="text-muted">あなたの傾向を自動分析</small>
    </div>

    <!-- ゲーミフィケーション -->
    ${renderGameStatsWidget()}

    <!-- AIアドバイス -->
    ${ai ? `
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <h6 class="section-header"><i class="bi bi-lightbulb me-1 text-warning"></i>AIからのアドバイス</h6>
        <div class="p-3 rounded mb-3" style="background:#e8f5e9;border:1px solid #a5d6a7;font-size:.85rem;line-height:2">
          ${tips.map(t=>`<div>${t}</div>`).join('')}

        <div class="row g-3">
          ${(() => {
            const sbw=bw(ai.surface), dbw=bw(ai.distance);
            return `
            <div class="col-md-6">
              <div class="fw-bold small text-muted mb-2"><i class="bi bi-moisture me-1"></i>馬場別</div>
              ${ai.surface.map(s=>scoreCard(s.label, s.label==='芝'?'🌿':'🟤', s, s.label===sbw.best?'best':s.label===sbw.worst?'worst':'')).join('')}

            </div>
            <div class="col-md-6">

              ${ai.betType.map(b=>scoreCard(b.label,'🎫',b,'')).join('')}
            </div>
            <div class="col-md-6">
              <div class="fw-bold small text-muted mb-2"><i class="bi bi-geo-alt me-1"></i>競馬場別</div>
              ${ai.venue.map(v=>scoreCard(v.label,'🏇',v,'')).join('')}
            </div>`;
          })()}
        </div>
      </div>
    </div>` : `

      <div class="card-body text-center py-5 text-muted">
        <i class="bi bi-bar-chart fs-1 d-block mb-3"></i>

        <a href="#budget" class="btn btn-success btn-sm"><i class="bi bi-plus-lg me-1"></i>馬券を記録する</a>
      </div>
    </div>`}

    <!-- 称号一覧 -->
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <h6 class="section-header"><i class="bi bi-trophy me-1 text-warning"></i>称号ロードマップ</h6>
        <div class="row g-2">

            ['🔰','新米予想師','3件以上記録','#607d8b'],

            ['🎯','一流予想師','回収率100%or的中率35%','#2e7d32'],
            ['⭐','凄腕予想師','回収率110%or的中率45%','#1565c0'],
            ['🏆','天才予想師','回収率130%or的中率50%','#e53935'],
            ['👑','伝説の予想師','回収率150%&的中率40%','#f9a825'],
          ].map(([badge, title, cond, color]) => {
            const isCurrent = gs.title === title;
            return `
            <div class="col-6 col-md-3">
              <div class="p-2 rounded text-center ${isCurrent?'shadow':'opacity-75'}"
                style="background:${isCurrent?'rgba(46,125,50,.1)':'#f9f9f9'};border:1px solid ${isCurrent?color:'#e0e0e0'};${isCurrent?'border-width:2px':''}">
                <div style="font-size:1.5rem">${badge}</div>
                <div style="font-size:.72rem;font-weight:700;color:${color}">${title}</div>

                ${isCurrent?'<div class="badge bg-success mt-1" style="font-size:.6rem">← 現在</div>':''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── 大口投票フラグ ──
function renderTanpukuBadge(tan, fuku, pop) {
  if(!fuku) return '';
  const ratio = Math.round(tan / fuku * 10) / 10;
  // 人気帯ごとの「正常な単複比」下限を設定
  const norm = pop <= 2 ? 2.5 : pop <= 4 ? 3.5 : 4.5;
  if (ratio < norm * 0.65) {
    return `<br><span style="font-size:.65rem;background:#fce4ec;color:#c62828;border:1px solid #f48fb1;padding:1px 5px;border-radius:3px;font-weight:700;cursor:default"
      title="単複比${ratio} — 大口複勝の疑い">🔴 大口 ${ratio}</span>`;
  } else if (ratio < norm * 0.82) {
    return `<br><span style="font-size:.65rem;background:#fff8e1;color:#e65100;border:1px solid #ffcc80;padding:1px 5px;border-radius:3px;font-weight:600;cursor:default"
      title="単複比${ratio} — やや大口の可能性">⚠ ${ratio}</span>`;
  }
  return `<br><span style="font-size:.63rem;color:#aaa" title="単複比${ratio}">複${fuku}倍</span>`;
}

// 四つ角を 1角→2角→3角→4角 形式でインライン表示
function renderCornerInline(r) {
  const vals = [r.corner_1, r.corner_2, r.corner_3, r.corner_4];
  if (!vals.some(c => c !== '' && c != null)) return '-';
  return vals.map((c, i) => {
    if (c === '' || c == null) return '';
    const n   = Number(c);
    const col = n <= 3 ? '#2e7d32' : n <= 6 ? '#1565c0' : n <= 10 ? '#e65100' : '#c62828';
    const sep = i < vals.length - 1 && vals[i+1] !== '' && vals[i+1] != null
      ? `<span style="color:#bbb;margin:0 1px">→</span>` : '';
    return `<span style="font-weight:700;font-size:.8rem;color:${col}">${n}</span>${sep}`;
  }).join('');
}
